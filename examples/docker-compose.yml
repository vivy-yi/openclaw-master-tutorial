# OpenClaw Docker Compose 一键部署
# 使用说明：https://github.com/openclaw-master-tutorial/docs/chapters/chapter02/

version: '3.8'

services:
  openclaw:
    image: openclaw/agent:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      # 持久化配置和数据
      - openclaw-data:/root/.openclaw
      # 可选：挂载工作目录
      - ./workspace:/workspace
    environment:
      # AI模型API Key (必填)
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Gateway认证Token (推荐设置)
      - GATEWAY_TOKEN=${GATEWAY_TOKEN:-}
      # 飞书配置 (可选)
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_ENCRYPT_KEY=${FEISHU_ENCRYPT_KEY:-}
      - FEISHU_VERIFICATION_TOKEN=${FEISHU_VERIFICATION_TOKEN:-}
      # 企业微信配置 (可选)
      - WECHAT_CORP_ID=${WECHAT_CORP_ID:-}
      - WECHAT_AGENT_ID=${WECHAT_AGENT_ID:-}
      - WECHAT_SECRET=${WECHAT_SECRET:-}
      # 日志级别
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - openclaw-network

  # 可选：Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      openclaw:
        condition: service_healthy
    networks:
      - openclaw-network
    profiles:
      - with-nginx

  # 可选：Redis缓存
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - openclaw-network
    profiles:
      - with-redis

  # 可选：监控
  prometheus:
    image: prom/prometheus:latest
    container_name: openclaw-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - openclaw-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: openclaw-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    networks:
      - openclaw-network
    profiles:
      - monitoring

volumes:
  openclaw-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  openclaw-network:
    driver: bridge
